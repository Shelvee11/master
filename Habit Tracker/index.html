<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="好习惯">
<meta name="theme-color" content="#3d52d5">
<title>好习惯</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%E5%A5%BD%E4%B9%A0%E6%83%AF%22%2C%22short_name%22%3A%22%E5%A5%BD%E4%B9%A0%E6%83%AF%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f5f7%22%2C%22theme_color%22%3A%22%233d52d5%22%2C%22start_url%22%3A%22.%2F%22%7D">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:  #3d52d5;
    --accent2: #5b6fe8;
    --green:   #2a9d5c;
    --red:     #e03e3e;
    --label:   #1d1d1f;
    --label2:  #6e6e73;
    --label3:  #adadb8;
    --fill:    #f0f0f5;
    --fill2:   #e8e8f0;
    --bg:      #f5f5f7;
    --bg2:     #ffffff;
    --sep:     #e2e2e8;
    --radius:  16px;
    --orange:  #cc7700;
    --orange-bg: rgba(255,149,0,0.12);
  }

  html { background: var(--bg); }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--label);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(245,245,247,0.85);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
    border-bottom: 1px solid var(--sep);
  }

  .header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--label);
  }

  .header-sub {
    font-size: 13px;
    color: var(--label2);
    margin-top: 2px;
    transition: color 0.2s;
  }

  .header-sub.all-done {
    color: var(--green);
    font-weight: 500;
  }

  /* Main */
  main {
    padding: 20px 16px calc(env(safe-area-inset-bottom) + 32px);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Card */
  .card {
    background: var(--bg2);
    border-radius: var(--radius);
    border: 1px solid var(--sep);
    overflow: hidden;
  }

  .card-inner {
    padding: 16px;
  }

  /* Habit header row */
  .habit-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .habit-info { flex: 1; min-width: 0; }

  .habit-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--label);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .habit-desc {
    font-size: 13px;
    color: var(--label2);
    margin-top: 3px;
  }

  /* Check button */
  .check-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--bg2);
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s, transform 0.08s, opacity 0.12s, border-color 0.12s;
    -webkit-user-select: none;
    user-select: none;
  }

  .check-btn:active { transform: scale(0.93); opacity: 0.75; }

  .check-btn.checked {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .check-btn.disabled {
    border-color: var(--label3);
    color: var(--label3);
    cursor: default;
    background: var(--fill);
  }

  .check-btn.disabled:active { transform: none; opacity: 1; }

  /* Progress dots */
  .progress-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dots {
    display: flex;
    gap: 5px;
    flex: 1;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--fill2);
    transition: background 0.15s;
  }

  .dot.filled { background: var(--accent); }
  .dot.complete { background: var(--green); }

  .progress-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--label2);
    white-space: nowrap;
  }

  .progress-text.done { color: var(--green); }

  /* Streak badge */
  .streak-badge {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 500;
    background: var(--orange-bg);
    color: var(--orange);
    padding: 3px 8px;
    border-radius: 8px;
  }

  .streak-badge.green {
    background: rgba(42,157,92,0.1);
    color: var(--green);
  }

  /* Divider */
  .card-divider {
    height: 1px;
    background: var(--sep);
    margin: 0 16px;
  }

  /* Export button */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
    cursor: pointer;
    border: none;
    transition: opacity 0.12s, transform 0.08s;
    -webkit-user-select: none;
    user-select: none;
  }

  .btn:active { opacity: 0.75; transform: scale(0.99); }

  .btn-export {
    background: var(--bg2);
    color: var(--accent);
    border: 1px solid var(--sep);
    font-size: 15px;
    font-weight: 500;
  }

  /* Week label */
  .week-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--label3);
    padding: 0 0 6px;
  }

  /* Single check (cooking) */
  .single-check-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .single-status {
    font-size: 13px;
    font-weight: 500;
    color: var(--label2);
  }

  .single-status.done { color: var(--green); }
</style>
</head>
<body>

<header class="header">
  <h1>好习惯</h1>
  <p class="header-sub" id="headerSub">本周进度追踪</p>
</header>

<main>
  <!-- Running -->
  <div class="card" id="card-running">
    <div class="card-inner">
      <div class="habit-header">
        <div class="habit-info">
          <div class="habit-title">🏃 跑步</div>
          <div class="habit-desc">每周 3 次</div>
        </div>
        <button class="check-btn" id="btn-running" onclick="checkIn('running')" aria-label="跑步打卡">＋</button>
      </div>
      <div class="progress-row">
        <div class="dots" id="dots-running"></div>
        <span class="progress-text" id="prog-running">0 / 3</span>
      </div>
      <div id="streak-running"></div>
    </div>
  </div>

  <!-- Japanese -->
  <div class="card" id="card-japanese">
    <div class="card-inner">
      <div class="habit-header">
        <div class="habit-info">
          <div class="habit-title">📖 学日语</div>
          <div class="habit-desc">每周 6 次，每次 30 分钟</div>
        </div>
        <button class="check-btn" id="btn-japanese" onclick="checkIn('japanese')" aria-label="日语打卡">＋</button>
      </div>
      <div class="progress-row">
        <div class="dots" id="dots-japanese"></div>
        <span class="progress-text" id="prog-japanese">0 / 6</span>
      </div>
      <div id="streak-japanese"></div>
    </div>
  </div>

  <!-- Cooking -->
  <div class="card" id="card-cooking">
    <div class="card-inner">
      <div class="habit-header">
        <div class="habit-info">
          <div class="habit-title">🍳 学新菜</div>
          <div class="habit-desc">每周 1 道新菜</div>
        </div>
        <button class="check-btn" id="btn-cooking" onclick="checkIn('cooking')" aria-label="学新菜打卡">＋</button>
      </div>
      <div class="single-check-row">
        <span class="single-status" id="cooking-status">本周尚未打卡</span>
      </div>
      <div id="streak-cooking"></div>
    </div>
  </div>

  <button class="btn btn-export" onclick="exportCSV()">导出 CSV</button>
</main>

<script>
// ── Date helpers ──────────────────────────────────────────────
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ISO week string "YYYY-Www" (Monday-based)
function isoWeek(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  dt.setUTCDate(dt.getUTCDate() + 4 - (dt.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  const week = Math.ceil((((dt - yearStart) / 86400000) + 1) / 7);
  return `${dt.getUTCFullYear()}-W${String(week).padStart(2,'0')}`;
}

function thisWeek() { return isoWeek(today()); }

// All ISO weeks from minDate to today, sorted ascending
function weeksBetween(minDate) {
  const result = [];
  const start = new Date(minDate + 'T00:00:00');
  const end = new Date(today() + 'T00:00:00');
  let cur = new Date(start);
  let prev = null;
  while (cur <= end) {
    const dateStr = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
    const w = isoWeek(dateStr);
    if (w !== prev) { result.push(w); prev = w; }
    cur.setDate(cur.getDate() + 1);
  }
  return result;
}

// ── Storage ───────────────────────────────────────────────────
const KEY = 'habit-tracker-data';

const HABITS = {
  running:  { goal: 3 },
  japanese: { goal: 6 },
  cooking:  { goal: 1 },
};

function loadData() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { running: { logs: [] }, japanese: { logs: [] }, cooking: { logs: [] } };
}

function saveData(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

// ── Streak calculation (per-week) ─────────────────────────────
function calcStreak(logs, goal) {
  if (!logs.length) return 0;
  const weekCounts = {};
  for (const d of logs) {
    const w = isoWeek(d);
    weekCounts[w] = (weekCounts[w] || 0) + 1;
  }
  const oldest = [...logs].sort()[0];
  const weeks = weeksBetween(oldest);
  const tw = thisWeek();

  let streak = 0;
  // Walk backwards from last complete week (exclude current week if incomplete)
  for (let i = weeks.length - 1; i >= 0; i--) {
    const w = weeks[i];
    const count = weekCounts[w] || 0;
    if (w === tw) {
      // current week: counts toward streak only if already met goal
      if (count >= goal) streak++;
      else if (streak === 0) continue; // haven't started streak yet
      else break; // current week incomplete breaks streak
    } else {
      if (count >= goal) streak++;
      else break;
    }
  }
  return streak;
}

// ── Check-in logic ────────────────────────────────────────────
function checkIn(habit) {
  const data = loadData();
  const h = data[habit];
  const td = today();
  const tw = thisWeek();

  // Count today's check-ins for this habit
  const todayCount = h.logs.filter(d => d === td).length;
  // Count this week's check-ins
  const weekCount = h.logs.filter(d => isoWeek(d) === tw).length;
  const goal = HABITS[habit].goal;

  if (habit === 'cooking') {
    // Toggle: if already checked this week, remove one; else add
    const weekIdx = h.logs.findLastIndex ? h.logs.findLastIndex(d => isoWeek(d) === tw)
      : [...h.logs].reverse().findIndex(d => isoWeek(d) === tw);
    if (weekCount >= 1) {
      // Remove the most recent log this week
      const idx = h.logs.lastIndexOf(h.logs.slice().reverse().find(d => isoWeek(d) === tw));
      // Remove last occurrence this week
      const lastIdx = h.logs.map((d,i) => isoWeek(d) === tw ? i : -1).filter(i => i >= 0).pop();
      if (lastIdx !== undefined) h.logs.splice(lastIdx, 1);
    } else {
      h.logs.push(td);
    }
  } else {
    // Allow multiple per day up to weekly goal; if today already logged, toggle off today's last entry
    if (todayCount >= 1) {
      // Remove last today entry (undo)
      const lastTodayIdx = h.logs.map((d,i) => d === td ? i : -1).filter(i => i >= 0).pop();
      if (lastTodayIdx !== undefined) h.logs.splice(lastTodayIdx, 1);
    } else if (weekCount < goal) {
      h.logs.push(td);
    }
  }

  saveData(data);
  render();
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const data = loadData();
  const tw = thisWeek();
  const td = today();

  let allDone = true;

  for (const habit of ['running', 'japanese', 'cooking']) {
    const h = data[habit];
    const goal = HABITS[habit].goal;
    const weekLogs = h.logs.filter(d => isoWeek(d) === tw);
    const weekCount = weekLogs.length;
    const todayLogged = h.logs.some(d => d === td);
    const done = weekCount >= goal;
    const streak = calcStreak(h.logs, goal);

    if (!done) allDone = false;

    // Button
    const btn = document.getElementById(`btn-${habit}`);
    if (habit === 'cooking') {
      btn.textContent = done ? '✓' : '＋';
      btn.className = 'check-btn' + (done ? ' checked' : '');
    } else {
      const atGoal = weekCount >= goal;
      const todayDone = todayLogged;
      btn.textContent = todayDone ? '✓' : '＋';
      btn.className = 'check-btn' + (todayDone ? ' checked' : '') + (atGoal && !todayDone ? ' disabled' : '');
      if (atGoal && !todayDone) {
        btn.setAttribute('disabled', '');
      } else {
        btn.removeAttribute('disabled');
      }
    }

    // Dots
    if (habit !== 'cooking') {
      const dotsEl = document.getElementById(`dots-${habit}`);
      dotsEl.innerHTML = '';
      for (let i = 0; i < goal; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i < weekCount ? (done ? ' complete' : ' filled') : '');
        dotsEl.appendChild(dot);
      }
      const prog = document.getElementById(`prog-${habit}`);
      prog.textContent = `${weekCount} / ${goal}`;
      prog.className = 'progress-text' + (done ? ' done' : '');
    }

    // Cooking status
    if (habit === 'cooking') {
      const status = document.getElementById('cooking-status');
      status.textContent = done ? '本周已完成 ✓' : '本周尚未打卡';
      status.className = 'single-status' + (done ? ' done' : '');
    }

    // Streak
    const streakEl = document.getElementById(`streak-${habit}`);
    if (streak > 0) {
      const isGreen = done;
      streakEl.innerHTML = `<div class="streak-badge${isGreen ? ' green' : ''}">🔥 连续 ${streak} 周</div>`;
    } else {
      streakEl.innerHTML = '';
    }
  }

  // Header subtitle
  const sub = document.getElementById('headerSub');
  if (allDone) {
    sub.textContent = '本周全部完成 🎉';
    sub.className = 'header-sub all-done';
  } else {
    const tw2 = thisWeek().replace('W', '第');
    sub.textContent = '本周进度追踪';
    sub.className = 'header-sub';
  }
}

// ── CSV Export ────────────────────────────────────────────────
function exportCSV() {
  const data = loadData();
  const habitNames = { running: '跑步', japanese: '学日语', cooking: '学新菜' };
  const rows = ['date,habit,habit_name'];
  for (const [key, h] of Object.entries(data)) {
    for (const d of [...h.logs].sort()) {
      rows.push(`${d},${key},${habitNames[key]}`);
    }
  }
  const csv = rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `habits_export_${today()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Service Worker ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'habits-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ── Init ──────────────────────────────────────────────────────
render();
</script>
</body>
</html>
