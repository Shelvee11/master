<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Spendex">
<meta name="theme-color" content="#3d52d5">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>Spendex</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --accent:  #3d52d5;
  --accent2: #5b6fe8;
  --green:   #2a9d5c;
  --red:     #e03e3e;
  --orange:  #d97706;
  --label:   #1d1d1f;
  --label2:  #6e6e73;
  --label3:  #adadb8;
  --fill:    #f0f0f5;
  --fill2:   #e8e8f0;
  --bg:      #f5f5f7;
  --bg2:     #ffffff;
  --sep:     #e2e2e8;
  --radius:  16px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--label);
  min-height: 100dvh;
  padding-bottom: calc(env(safe-area-inset-bottom) + 80px);
}

header {
  background: rgba(245,245,247,0.9);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--sep);
  padding: 14px 20px 12px;
  padding-top: calc(env(safe-area-inset-top) + 14px);
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; color: var(--accent); }
header p  { font-size: 13px; color: var(--label2); margin-top: 2px; }

/* Tab bar */
.tab-bar {
  display: flex; background: var(--bg2);
  border-bottom: 1px solid var(--sep);
  position: fixed; left: 0; right: 0; z-index: 9;
}
.tab-btn {
  flex: 1; padding: 12px 4px; border: none; background: none;
  font-size: 14px; font-weight: 500; font-family: inherit;
  color: var(--label2); cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

main {
  max-width: 430px; margin: 0 auto;
  padding: 16px 16px 0;
  padding-top: 16px;
  display: flex; flex-direction: column; gap: 12px;
}

.panel { display: none; }
.panel.active { display: contents; }

.card {
  background: var(--bg2); border-radius: var(--radius);
  border: 1px solid var(--sep); overflow: hidden;
}

.card-label {
  font-size: 12px; color: var(--label2); font-weight: 500;
  padding: 0 4px 6px;
  text-transform: uppercase; letter-spacing: 0.06em;
}

/* Category grid */
.cat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
}
.cat-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 4px; border: none; background: none; font-family: inherit;
  cursor: pointer; transition: background 0.1s;
  border-right: 1px solid var(--sep); border-bottom: 1px solid var(--sep);
  color: var(--label2); font-size: 12px; gap: 4px;
}
.cat-btn:nth-child(4n) { border-right: none; }
.cat-btn:nth-last-child(-n+4):nth-child(4n+1),
.cat-btn:nth-last-child(-n+4):nth-child(4n+2),
.cat-btn:nth-last-child(-n+4):nth-child(4n+3),
.cat-btn:nth-last-child(-n+4) { border-bottom: none; }
.cat-btn:active { background: var(--fill); }
.cat-btn.selected { background: rgba(61,82,213,0.07); color: var(--accent); }
.cat-btn .icon { font-size: 22px; }

/* Sub categories */
.sub-cats {
  display: none; flex-wrap: wrap; gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--sep);
}
.sub-cats.show { display: flex; }
.sub-btn {
  padding: 7px 16px; border: 1px solid var(--sep); border-radius: 20px;
  background: var(--bg2); color: var(--label2); font-size: 14px;
  font-family: inherit; cursor: pointer; transition: all 0.12s;
}
.sub-btn.selected {
  border-color: var(--accent); background: rgba(61,82,213,0.07); color: var(--accent);
}

/* Form rows */
.form-row {
  display: flex; align-items: center; min-height: 48px;
  padding: 0 16px; border-bottom: 1px solid var(--sep); gap: 12px;
}
.form-row:last-child { border-bottom: none; }
.form-label { font-size: 16px; color: var(--label); flex: 0 0 60px; font-weight: 500; }
.form-input {
  flex: 1; border: none; outline: none; background: none;
  font-size: 16px; font-family: inherit; color: var(--label); text-align: right;
  padding: 12px 0;
}
.form-input::placeholder { color: var(--label3); }
.form-input[type="number"] { font-size: 20px; font-weight: 600; color: var(--accent); }
.form-input[type="date"] { color: var(--label2); }

/* Buttons */
.btn {
  width: 100%; padding: 14px; border: none; border-radius: var(--radius);
  font-size: 16px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: opacity 0.12s, transform 0.08s; letter-spacing: -0.2px;
}
.btn:active { opacity: 0.75; transform: scale(0.99); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary {
  background: var(--bg2); color: var(--label2);
  border: 1px solid var(--sep); font-size: 15px; font-weight: 500;
}
.btn-cancel {
  background: none; color: var(--label2);
  border: 1px solid var(--sep); font-size: 14px;
}
.btn:disabled { background: var(--fill); color: var(--label3); border: 1px solid var(--sep); cursor: default; }
.btn:disabled:active { opacity: 1; transform: none; }
.btn-group { display: flex; flex-direction: column; gap: 10px; }


/* Month picker */
.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; position: relative;
}
.month-nav button {
  background: none; border: none; color: var(--accent);
  font-size: 22px; padding: 2px 8px; cursor: pointer; font-family: inherit;
}
.month-nav span { font-size: 16px; font-weight: 600; color: var(--label); }
/* Data actions */
.data-actions {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
}
.data-action-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 14px 4px; border: none; background: none; font-family: inherit;
  cursor: pointer; color: var(--label2); font-size: 12px; gap: 8px;
  border-right: 1px solid var(--sep); transition: background 0.1s;
}
.data-action-btn:last-child { border-right: none; }
.data-action-btn:active { background: var(--fill); }
.icon-emoji  { font-size: 28px; line-height: 1; }
.icon-img    { width: 32px; height: 32px; object-fit: contain; }

/* Summary */
.summary-row {
  display: flex; padding: 14px 16px; gap: 12px;
  border-bottom: 1px solid var(--sep);
}
.summary-cell { flex: 1; }
.summary-cell-label { font-size: 11px; color: var(--label2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.summary-big   { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.summary-small { font-size: 15px; font-weight: 600; }
.col-expense { color: var(--orange); }
.col-income  { color: var(--green); }
.col-pos     { color: var(--green); }
.col-neg     { color: var(--red); }

.cat-breakdown { padding: 10px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.cat-breakdown-row {
  display: flex; justify-content: space-between;
  padding: 5px 8px; background: var(--fill); border-radius: 8px; font-size: 13px;
}
.cat-breakdown-row .amt { color: var(--orange); font-weight: 600; }

/* Record list */
.record-item {
  display: flex; align-items: center; min-height: 52px;
  padding: 0 16px; border-bottom: 1px solid var(--sep); gap: 10px;
  transition: background 0.1s;
}
.record-item:last-child { border-bottom: none; }
.record-left { flex: 1; min-width: 0; }
.record-cat  { font-size: 15px; font-weight: 500; color: var(--label); }
.record-meta { font-size: 12px; color: var(--label3); margin-top: 2px; }
.record-right { text-align: right; flex-shrink: 0; }
.record-amt  { font-size: 16px; font-weight: 600; color: var(--orange); }
.record-amt.income { color: var(--green); }
.record-date-label { font-size: 11px; color: var(--label3); margin-top: 2px; }

.record-edit-btn {
  background: none; border: none; color: var(--accent);
  font-size: 14px; padding: 6px; cursor: pointer; opacity: 0.7; font-family: inherit;
}
.record-del-btn {
  background: none; border: none; color: var(--red);
  font-size: 18px; padding: 6px 4px; cursor: pointer; opacity: 0.6; font-family: inherit;
}

.empty-msg {
  text-align: center; color: var(--label3); padding: 40px 0; font-size: 14px;
}

/* Toast */
.toast {
  position: fixed; top: calc(env(safe-area-inset-top) + 70px);
  left: 50%; transform: translateX(-50%) translateY(-120px);
  background: var(--label); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 14px; font-weight: 500;
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Spendex</h1>
    <p id="today-label"></p>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('record')">记一笔</button>
  <button class="tab-btn" onclick="switchTab('history')">明细</button>
</div>

<main>
  <!-- Record Panel -->
  <div id="record-panel" class="panel active">
    <p class="card-label">类别</p>
    <div class="card">
      <div class="cat-grid" id="cat-grid"></div>
      <div class="sub-cats" id="sub-cats"></div>
    </div>

    <p class="card-label">详情</p>
    <div class="card">
      <div class="form-row">
        <span class="form-label">日期</span>
        <input class="form-input" type="date" id="record-date" style="color:var(--label2)">
      </div>
      <div class="form-row">
        <span class="form-label">金额</span>
        <input class="form-input" type="number" id="amount" placeholder="0.00" inputmode="decimal" step="0.01">
      </div>
      <div class="form-row">
        <span class="form-label">备注</span>
        <input class="form-input" type="text" id="note" placeholder="可选">
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="submit-btn" onclick="saveRecord()" disabled>记一笔</button>
      <button class="btn btn-cancel" id="cancel-btn" onclick="cancelEdit()" style="display:none">取消编辑</button>
    </div>
  </div>

  <!-- History Panel -->
  <div id="history-panel" class="panel">
    <div class="card">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="month-label"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="card" id="summary-card"></div>

    <p class="card-label">数据管理</p>
    <div class="card">
      <div class="data-actions">
        <button class="data-action-btn" onclick="exportAllCSV()"><span class="icon-emoji">🗂️</span>导出全部</button>
        <button class="data-action-btn" onclick="exportCSV()"><span class="icon-emoji">📄</span>导出本月</button>
        <button class="data-action-btn" onclick="importCSV()"><img class="icon-img" src="data-backup.png" alt="恢复">恢复数据</button>
      </div>
    </div>

    <p class="card-label">记录</p>
    <div class="card" id="records-card"></div>

  </div>
</main>

<div class="toast" id="toast">已记录</div>

<script>
const CATS = [
  {code:"A-衣", icon:"👔", subs:["衣物","护肤品","彩妆"]},
  {code:"B-食", icon:"🍜", subs:["饮食"]},
  {code:"C-住", icon:"🏠", subs:["房租","水电煤","日用品"]},
  {code:"D-行", icon:"🚗", subs:["交通"]},
  {code:"E-社交", icon:"🤝", subs:["社交"]},
  {code:"F-娱乐", icon:"🎮", subs:["娱乐"]},
  {code:"G-购物", icon:"🛒", subs:["购物"]},
  {code:"H-旅游", icon:"✈️", subs:["旅游"]},
  {code:"I-父母", icon:"❤️", subs:["父母"]},
  {code:"J-医疗", icon:"💊", subs:["医疗"]},
  {code:"Z-其他", icon:"📦", subs:["订阅","快递","保险","其他"]},
  {code:"收入",  icon:"💰", subs:["工资","公积金","报销","其他"], isIncome:true},
];

let selectedCat = null;
let selectedSub = null;
let editingId   = null;
let viewMonth   = new Date().toISOString().slice(0,7);

// ── Storage ──────────────────────────────────────────────────

function getRecords() {
  try { return JSON.parse(localStorage.getItem('expense_records') || '[]'); }
  catch { return []; }
}
function saveRecords(records) {
  localStorage.setItem('expense_records', JSON.stringify(records));
}

// ── CSV Import ───────────────────────────────────────────────

function importCSV() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv,text/csv';
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => parseAndImportCSV(reader.result);
    reader.readAsText(file);
  };
  input.click();
}

function parseAndImportCSV(text) {
  const lines = text.replace(/^﻿/, '').trim().split('\n');
  if (lines.length < 2) { alert('CSV 文件为空'); return; }
  const incoming = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length < 5) continue;
    const [dateStr, type, largeCat, smallCat, amount, ...rest] = cols;
    const note = rest.join(',').trim();
    const amt = parseFloat(amount);
    if (!dateStr || isNaN(amt)) continue;
    incoming.push({
      id: new Date(dateStr).getTime() + i,
      date: dateStr.trim(),
      dateStr: dateStr.trim(),
      largeCat: largeCat.trim(),
      smallCat: smallCat.trim(),
      type: type.trim() || '支出',
      amount: amt,
      note: note
    });
  }
  if (!incoming.length) { alert('未找到有效记录'); return; }
  const existing = getRecords();
  const existSet = new Set(existing.map(r => `${r.date}_${r.largeCat}_${r.smallCat}_${r.amount}`));
  const newRecs = incoming.filter(r => !existSet.has(`${r.date}_${r.largeCat}_${r.smallCat}_${r.amount}`));
  if (!newRecs.length) { alert('所有记录已存在，无需导入。'); return; }
  if (!confirm(`发现 ${newRecs.length} 条新记录，合并到现有 ${existing.length} 条中？`)) return;
  const merged = [...existing, ...newRecs].sort((a, b) => a.id - b.id);
  saveRecords(merged);
  renderHistory();
  alert(`已导入 ${newRecs.length} 条记录！当前共 ${merged.length} 条。`);
}

// ── Record Panel ──────────────────────────────────────────────

function initDate() {
  const now = new Date();
  const val = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0,10);
  document.getElementById('record-date').value = val;
}

function initCatGrid() {
  document.getElementById('cat-grid').innerHTML = CATS.map(c =>
    `<button class="cat-btn" onclick="selectCat('${c.code}')">
      <span class="icon">${c.icon}</span>${c.code.replace(/^[A-Z]-/, '')}
    </button>`
  ).join('');
}

function selectCat(code) {
  selectedCat = CATS.find(c => c.code === code);
  selectedSub = null;
  document.querySelectorAll('.cat-btn').forEach((el, i) =>
    el.classList.toggle('selected', CATS[i].code === code));
  const subDiv = document.getElementById('sub-cats');
  if (selectedCat.subs.length === 1) {
    selectedSub = selectedCat.subs[0];
    subDiv.classList.remove('show');
  } else {
    subDiv.innerHTML = selectedCat.subs.map(s =>
      `<button class="sub-btn" onclick="selectSub(this,'${s}')">${s}</button>`
    ).join('');
    subDiv.classList.add('show');
  }
  updateSubmit();
}

function selectSub(el, sub) {
  selectedSub = sub;
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  updateSubmit();
}

function updateSubmit() {
  const amt = document.getElementById('amount').value;
  document.getElementById('submit-btn').disabled = !(selectedCat && selectedSub && parseFloat(amt) > 0);
}

function saveRecord() {
  const amt = parseFloat(document.getElementById('amount').value);
  if (!selectedCat || !selectedSub || !amt) return;
  const dtVal = document.getElementById('record-date').value;
  const record = {
    id:       editingId || Date.now(),
    date:     dtVal,
    dateStr:  dtVal,
    largeCat: selectedCat.code,
    smallCat: selectedSub,
    type:     selectedCat.isIncome ? '收入' : '支出',
    amount:   amt,
    note:     document.getElementById('note').value.trim()
  };
  const records = getRecords();
  if (editingId) {
    const idx = records.findIndex(r => r.id === editingId);
    if (idx !== -1) records[idx] = record;
  } else {
    records.push(record);
  }
  saveRecords(records);
  resetForm();
  showToast();
}

function resetForm() {
  document.getElementById('amount').value = '';
  document.getElementById('note').value = '';
  selectedCat = null; selectedSub = null; editingId = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('sub-cats').classList.remove('show');
  document.getElementById('submit-btn').textContent = '记一笔';
  document.getElementById('cancel-btn').style.display = 'none';
  initDate();
  updateSubmit();
}

function cancelEdit() { resetForm(); }

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ── History Panel ─────────────────────────────────────────────

function changeMonth(delta) {
  const [y, m] = viewMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  viewMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  renderHistory();
}

function renderHistory() {
  document.getElementById('month-label').textContent = viewMonth;
  const all = getRecords().filter(r => r.date.startsWith(viewMonth)).sort((a,b) => b.id - a.id);
  const incRecs = all.filter(r => r.type === '收入');
  const expRecs = all.filter(r => r.type !== '收入');
  const totalInc = incRecs.reduce((s,r) => s+r.amount, 0);
  const totalExp = expRecs.reduce((s,r) => s+r.amount, 0);
  const net = totalInc - totalExp;

  const byLargeCat = {};
  expRecs.forEach(r => { byLargeCat[r.largeCat] = (byLargeCat[r.largeCat]||0) + r.amount; });

  const summaryCard = document.getElementById('summary-card');
  if (!all.length) {
    summaryCard.innerHTML = '<div class="empty-msg">本月暂无记录</div>';
  } else {
    const netCls = net >= 0 ? 'col-pos' : 'col-neg';
    summaryCard.innerHTML = `
      <div class="summary-row">
        <div class="summary-cell">
          <div class="summary-cell-label">支出</div>
          <div class="summary-big col-expense">¥${totalExp.toFixed(2)}</div>
        </div>
        <div class="summary-cell" style="text-align:right">
          <div class="summary-cell-label">收入</div>
          <div class="summary-small col-income">+¥${totalInc.toFixed(2)}</div>
          <div style="margin-top:4px">
            <div class="summary-cell-label">净收支</div>
            <div class="summary-small ${netCls}">${net>=0?'+':''}¥${net.toFixed(2)}</div>
          </div>
        </div>
      </div>
      <div style="padding:8px 16px;font-size:12px;color:var(--label3);border-bottom:1px solid var(--sep)">${all.length} 笔记录</div>
      ${Object.keys(byLargeCat).length ? `<div class="cat-breakdown">
        ${Object.entries(byLargeCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>
          `<div class="cat-breakdown-row"><span>${cat}</span><span class="amt">¥${amt.toFixed(2)}</span></div>`
        ).join('')}
      </div>` : ''}`;
  }

  const recordsCard = document.getElementById('records-card');
  if (!all.length) {
    recordsCard.innerHTML = '<div class="empty-msg">暂无记录</div>';
    return;
  }
  recordsCard.innerHTML = all.map(r => `
    <div class="record-item">
      <div class="record-left">
        <div class="record-cat">${r.largeCat} · ${r.smallCat}</div>
        <div class="record-meta">${r.dateStr}${r.note ? ' · ' + r.note : ''}</div>
      </div>
      <div class="record-right">
        <div class="record-amt${r.type==='收入'?' income':''}">${r.type==='收入'?'+':'-'}¥${r.amount.toFixed(2)}</div>
      </div>
      <button class="record-edit-btn" onclick="editRecord(${r.id})">✏️</button>
      <button class="record-del-btn"  onclick="delRecord(${r.id})">×</button>
    </div>
  `).join('');
}

function editRecord(id) {
  const record = getRecords().find(r => r.id === id);
  if (!record) return;
  switchTab('record');
  editingId = id;
  document.getElementById('record-date').value = record.date.slice(0,10);
  selectCat(record.largeCat);
  if (selectedCat && selectedCat.subs.length > 1) {
    document.querySelectorAll('.sub-btn').forEach(b => {
      if (b.textContent === record.smallCat) selectSub(b, record.smallCat);
    });
  }
  document.getElementById('amount').value = record.amount;
  document.getElementById('note').value   = record.note || '';
  document.getElementById('submit-btn').textContent    = '保存修改';
  document.getElementById('cancel-btn').style.display = 'block';
  updateSubmit();
}

function delRecord(id) {
  if (!confirm('删除这条记录？')) return;
  saveRecords(getRecords().filter(r => r.id !== id));
  renderHistory();
}

// ── Export ────────────────────────────────────────────────────

function buildCSV(records) {
  const rows = records.sort((a,b)=>a.id-b.id).map(r =>
    `${r.dateStr},${r.type||'支出'},${r.largeCat},${r.smallCat},${r.amount},${(r.note||'').replace(/,/g,'，')}`
  );
  return '日期,类型,大类,小类,金额,备注\n' + rows.join('\n') + '\n';
}

function triggerDownload(csv, filename) {
  const file = new File(['﻿' + csv], filename, {type: 'text/csv;charset=utf-8'});
  if (navigator.canShare && navigator.canShare({files: [file]})) {
    navigator.share({files: [file], title: filename}).catch(() => fallbackDownload(csv, filename));
  } else {
    fallbackDownload(csv, filename);
  }
}

function fallbackDownload(csv, filename) {
  const url = URL.createObjectURL(new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8'}));
  const a = Object.assign(document.createElement('a'), {href: url, download: filename});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportCSV() {
  const records = getRecords().filter(r => r.date.startsWith(viewMonth));
  if (!records.length) { alert('本月没有记录'); return; }
  triggerDownload(buildCSV(records), `expense_${viewMonth}.csv`);
}

function exportAllCSV() {
  const records = getRecords();
  if (!records.length) { alert('没有记录'); return; }
  triggerDownload(buildCSV(records), 'expense_all.csv');
}

// ── Tab Switch ────────────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0) === (tab==='record')));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (tab === 'record') {
    document.getElementById('record-panel').classList.add('active');
  } else {
    if (editingId) resetForm();
    document.getElementById('history-panel').classList.add('active');
    renderHistory();
  }
}

// ── Init ──────────────────────────────────────────────────────

function init() {
  const d = new Date();
  document.getElementById('today-label').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  const hdr = document.querySelector('header');
  const tab = document.querySelector('.tab-bar');
  const hdrH = hdr.offsetHeight;
  tab.style.top = hdrH + 'px';
  document.querySelector('main').style.paddingTop = (hdrH + tab.offsetHeight + 16) + 'px';

  initCatGrid();
  initDate();
  selectCat('B-食');
  document.getElementById('amount').addEventListener('input', updateSubmit);
  if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('service-worker.js');

  let touchStartX = 0, touchStartY = 0;
  document.body.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, {passive: true});
  document.body.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      switchTab(dx < 0 ? 'history' : 'record');
    }
  }, {passive: true});
}

init();
</script>
