<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="断食追踪">
  <meta name="theme-color" content="#3d52d5">
  <link rel="manifest" href="manifest.json">
  <title>16+8 断食追踪</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --accent:  #3d52d5;
      --accent2: #5b6fe8;
      --green:   #2a9d5c;
      --red:     #e03e3e;
      --label:   #1d1d1f;
      --label2:  #6e6e73;
      --label3:  #adadb8;
      --fill:    #f0f0f5;
      --fill2:   #e8e8f0;
      --bg:      #f5f5f7;
      --bg2:     #ffffff;
      --sep:     #e2e2e8;
      --radius:  16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--label);
      min-height: 100dvh;
      padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
    }

    header {
      background: rgba(245,245,247,0.9);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--sep);
      padding: 14px 20px 12px;
      padding-top: calc(env(safe-area-inset-top) + 14px);
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; color: var(--accent); }
    header p  { font-size: 13px; color: var(--label2); margin-top: 2px; }

    main {
      max-width: 430px; margin: 0 auto;
      padding: 20px 16px 0;
      display: flex; flex-direction: column; gap: 12px;
    }

    .card {
      background: var(--bg2); border-radius: var(--radius);
      border: 1px solid var(--sep); overflow: hidden;
    }

    .card-label {
      font-size: 12px; color: var(--label2); font-weight: 500;
      padding: 0 4px 6px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* Mode selector */
    .mode-row { display: flex; }
    .mode-btn {
      flex: 1; padding: 12px 4px; border: none; background: none;
      font-size: 14px; font-weight: 500; font-family: inherit;
      color: var(--label2); cursor: pointer;
      border-right: 1px solid var(--sep); transition: background 0.1s;
      line-height: 1.3;
    }
    .mode-btn:last-child { border-right: none; }
    .mode-btn.active {
      color: var(--accent); font-weight: 700;
      background: rgba(61,82,213,0.07);
    }
    .mode-btn:active { background: var(--fill); }
    .mode-btn small { display: block; font-size: 11px; font-weight: 400; color: var(--label3); margin-top: 2px; }
    .mode-btn.active small { color: var(--accent); opacity: 0.7; }

    /* Today time rows */
    .time-row {
      display: flex; align-items: center; min-height: 48px;
      padding: 0 16px; border-bottom: 1px solid var(--sep); gap: 12px;
      cursor: pointer; transition: background 0.1s;
    }
    .time-row:hover { background: var(--fill); }
    .time-row:last-of-type { border-bottom: none; }
    .row-label { font-size: 16px; color: var(--label); flex: 1; font-weight: 500; }
    .time-val  { font-size: 16px; color: var(--accent); font-weight: 600; }
    .time-placeholder-text { font-size: 15px; color: var(--label3); }

    /* Duration */
    .dur-row {
      display: flex; padding: 12px 16px; gap: 10px;
      border-top: 1px solid var(--sep);
    }
    .dur-chip { flex: 1; border-radius: 12px; padding: 10px 8px; text-align: center; }
    .dur-chip-eat  { background: rgba(61,82,213,0.08); }
    .dur-chip-fast { background: rgba(61,82,213,0.04); border: 1px solid var(--sep); }
    .dur-chip strong { display: block; font-size: 20px; font-weight: 700; margin-bottom: 2px; letter-spacing: -0.5px; }
    .dur-chip-eat  strong { color: var(--accent); }
    .dur-chip-fast strong { color: var(--label2); }
    .dur-chip span { font-size: 11px; color: var(--label2); text-transform: uppercase; letter-spacing: 0.04em; }

    /* Hint */
    .hint-banner {
      background: var(--bg2); border-radius: var(--radius);
      border: 1px solid var(--sep);
      padding: 14px 18px; display: none;
      border-left: 3px solid var(--accent);
    }
    .hint-banner.visible { display: block; }
    .hint-eyebrow {
      font-size: 11px; color: var(--accent); font-weight: 600;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .hint-time { font-size: 34px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; color: var(--label); }
    .hint-sub  { font-size: 13px; color: var(--label2); margin-top: 6px; }

    /* Buttons */
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity 0.12s, transform 0.08s; letter-spacing: -0.2px;
    }
    .btn:active { opacity: 0.75; transform: scale(0.99); }
    .btn-start  { background: var(--accent); color: #fff; }
    .btn-end    { background: var(--label); color: #fff; }
    .btn-export {
      background: var(--bg2); color: var(--label2);
      border: 1px solid var(--sep);
      font-size: 15px; font-weight: 500;
    }
    .btn:disabled { background: var(--fill); color: var(--label3); border: 1px solid var(--sep); cursor: default; }
    .btn:disabled:active { opacity: 1; transform: none; }

    /* Chart */
    .chart-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 4px 0 0; }

    /* History */
    .history-item {
      display: flex; align-items: center; min-height: 46px;
      padding: 0 16px; border-bottom: 1px solid var(--sep); gap: 10px;
      cursor: pointer; transition: background 0.1s;
    }
    .history-item:hover { background: var(--fill); }
    .history-item:last-child { border-bottom: none; }
    .h-date { font-size: 14px; color: var(--label2); width: 44px; flex-shrink: 0; font-weight: 500; }
    .h-win  { font-size: 14px; color: var(--label); flex: 1; }
    .h-dur  { font-size: 14px; font-weight: 600; }
    .h-ok   { color: var(--green); }
    .h-over { color: var(--red); }
    .h-part { color: var(--label3); }

    /* ── Generic Modal Sheet ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 100; display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-sheet {
      width: 100%; background: var(--bg2);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--sep);
      height: 50dvh;
      display: flex; flex-direction: column;
      padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 10px; border-bottom: 1px solid var(--sep);
    }
    .modal-title { font-size: 16px; font-weight: 600; color: var(--label); }
    .modal-btn { font-size: 16px; font-family: inherit; border: none; background: none; cursor: pointer; padding: 0; }
    .modal-btn-cancel { color: var(--label2); }
    .modal-btn-done   { color: var(--accent); font-weight: 600; }

    /* Scroll picker */
    .time-picker-cols {
      display: flex; justify-content: center; align-items: center;
      flex: 1; position: relative; overflow: hidden;
    }
    .picker-col {
      flex: 0 0 80px; height: 100%;
      overflow-y: scroll; scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      touch-action: pan-y;
    }
    .picker-col::-webkit-scrollbar { display: none; }
    .picker-item {
      height: 44px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; scroll-snap-align: center; color: var(--label);
    }
    .picker-spacer { height: calc(50% - 22px); }
    .picker-separator { font-size: 22px; font-weight: 300; flex: 0 0 16px; text-align: center; color: var(--label2); }
    .time-picker-cols::before {
      content: ''; position: absolute; left: 16px; right: 16px; height: 44px;
      top: calc(50% - 22px);
      border-top: 1px solid var(--sep); border-bottom: 1px solid var(--sep);
      background: var(--fill); border-radius: 8px; pointer-events: none;
    }

    /* ── Action Sheet ── */
    .action-sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 200; display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .action-sheet-overlay.open { opacity: 1; pointer-events: all; }

    .action-sheet {
      width: 100%; padding: 0 12px calc(env(safe-area-inset-bottom) + 12px);
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    .action-sheet-overlay.open .action-sheet { transform: translateY(0); }

    .action-group {
      background: var(--bg2); border-radius: var(--radius);
      border: 1px solid var(--sep);
      overflow: hidden; margin-bottom: 10px;
    }

    .action-title {
      padding: 12px 16px 10px;
      font-size: 13px; color: var(--label2); text-align: center;
      border-bottom: 1px solid var(--sep);
    }

    .action-btn {
      width: 100%; padding: 15px; border: none; background: var(--bg2);
      font-size: 16px; font-family: inherit; cursor: pointer;
      border-bottom: 1px solid var(--sep); text-align: center;
      transition: background 0.1s;
    }
    .action-btn:last-child { border-bottom: none; }
    .action-btn:active { background: var(--fill); }
    .action-btn-blue   { color: var(--accent); }
    .action-btn-red    { color: var(--red); }
    .action-btn-cancel { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>

<header>
  <h1>16+8 断食追踪</h1>
  <p id="today-label"></p>
</header>

<main>
  <p class="card-label">断食模式</p>
  <div class="card">
    <div class="mode-row" id="mode-selector"></div>
  </div>

  <p class="card-label">今日进食窗口</p>
  <div class="card">
    <div class="time-row" onclick="openPicker('start', todayKey())">
      <span class="row-label">开始进食</span>
      <span id="start-display" class="time-placeholder-text">点击记录</span>
    </div>
    <div class="time-row" onclick="openPicker('end', todayKey())">
      <span class="row-label">结束进食</span>
      <span id="end-display" class="time-placeholder-text">点击记录</span>
    </div>
    <div class="dur-row" id="duration-row" style="display:none">
      <div class="dur-chip dur-chip-eat">
        <strong id="eat-hours">-</strong><span>进食时长</span>
      </div>
      <div class="dur-chip dur-chip-fast">
        <strong id="fast-hours">-</strong><span>断食时长</span>
      </div>
    </div>
  </div>

  <div class="hint-banner" id="hint-card">
    <div class="hint-eyebrow" id="hint-label"></div>
    <div class="hint-time"    id="hint-time"></div>
    <div class="hint-sub"     id="hint-sub"></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-start" id="btn-start" onclick="recordNow('start')">开始进食</button>
    <button class="btn btn-end"   id="btn-end"   onclick="recordNow('end')" disabled>结束进食</button>
  </div>

  <p class="card-label" style="margin-top:4px">过去 30 天进食时长</p>
  <div class="card" style="padding:16px">
    <div class="chart-scroll" id="chart-container"></div>
  </div>

  <p class="card-label" style="margin-top:4px">历史记录 <span style="font-size:11px;color:var(--label3)">(点击可编辑)</span></p>
  <div class="card">
    <div id="history-list"></div>
  </div>

  <button class="btn btn-export" onclick="exportCSV()">导出 CSV</button>
</main>

<!-- Time Picker Modal -->
<div class="modal-overlay" id="modal" onclick="handlePickerOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-header">
      <button class="modal-btn modal-btn-cancel" onclick="closePicker()">取消</button>
      <span class="modal-title" id="modal-title">选择时间</span>
      <button class="modal-btn modal-btn-done" onclick="confirmPicker()">确定</button>
    </div>
    <div class="time-picker-cols">
      <div class="picker-col" id="col-hour"></div>
      <div class="picker-separator">:</div>
      <div class="picker-col" id="col-minute"></div>
    </div>
  </div>
</div>

<!-- History Action Sheet -->
<div class="action-sheet-overlay" id="action-sheet" onclick="handleActionOverlayClick(event)">
  <div class="action-sheet">
    <div class="action-group">
      <div class="action-title" id="action-title"></div>
      <button class="action-btn action-btn-blue" onclick="editHistoryField('start')">修改开始时间</button>
      <button class="action-btn action-btn-blue" onclick="editHistoryField('end')">修改结束时间</button>
      <button class="action-btn action-btn-red"  onclick="deleteHistoryRecord()">删除这天的记录</button>
    </div>
    <div class="action-group">
      <button class="action-btn action-btn-cancel" onclick="closeActionSheet()">取消</button>
    </div>
  </div>
</div>

<script>
const MODES = [
  { label: '16:8', fast: 16, eat: 8 },
  { label: '15:9', fast: 15, eat: 9 },
  { label: '14:10', fast: 14, eat: 10 },
];
const MODE_KEY    = 'fasting-mode';
const STORAGE_KEY = 'fasting-records';
const MINUTE_STEP = 5;

function getMode() {
  const i = parseInt(localStorage.getItem(MODE_KEY) || '0');
  return MODES[i] || MODES[0];
}
function getModeIndex() {
  return parseInt(localStorage.getItem(MODE_KEY) || '0');
}
function setModeIndex(i) {
  localStorage.setItem(MODE_KEY, String(i));
}

let pickerField    = null;  // 'start' | 'end'
let pickerDateKey  = null;  // which date the picker is editing
let actionDateKey  = null;  // which date the action sheet is for

// ── Mode selector ─────────────────────────────────────────

function renderModeSelector() {
  const current = getModeIndex();
  document.getElementById('mode-selector').innerHTML = MODES.map((m, i) =>
    `<button class="mode-btn${i===current?' active':''}" onclick="switchMode(${i})">
      ${m.label}<small>断食 ${m.fast}h / 进食 ${m.eat}h</small>
    </button>`
  ).join('');
  document.querySelector('header h1').textContent = `${MODES[current].label} 断食追踪`;
}

function switchMode(i) {
  setModeIndex(i);
  renderModeSelector();
  const rec = getRecords()[todayKey()] || {};
  refreshToday(rec);
  renderChart();
  renderHistory();
}

// ── Utils ─────────────────────────────────────────────────

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function fmtKey(key) {
  const [, m, d] = key.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}

function getRecords() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
function saveRecords(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }

function addMinutes(t, mins) {
  const [h, m] = t.split(':').map(Number);
  const total = ((h*60+m+mins) % 1440 + 1440) % 1440;
  return `${pad(Math.floor(total/60))}:${pad(total%60)}`;
}

function calcEatHours(start, end) {
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let mins = (eh*60+em)-(sh*60+sm);
  if (mins < 0) mins += 1440;
  return mins / 60;
}

function nowHHMM() {
  const n = new Date();
  const rounded = Math.round((n.getHours()*60+n.getMinutes()) / MINUTE_STEP) * MINUTE_STEP;
  return `${pad(Math.floor(rounded/60)%24)}:${pad(rounded%60)}`;
}

// ── Picker ────────────────────────────────────────────────

function buildCol(col, items, idx) {
  col.innerHTML = `<div class="picker-spacer"></div>` +
    items.map(v => `<div class="picker-item">${v}</div>`).join('') +
    `<div class="picker-spacer"></div>`;
  requestAnimationFrame(() => { col.scrollTop = idx * 44; });
}

function openPicker(field, dateKey) {
  pickerField   = field;
  pickerDateKey = dateKey || todayKey();

  const rec = (getRecords()[pickerDateKey] || {});
  const existing = rec[field] || nowHHMM();
  const [h, m] = existing.split(':').map(Number);

  const hours   = Array.from({length:24}, (_,i) => pad(i));
  const minutes = Array.from({length:60/MINUTE_STEP}, (_,i) => pad(i*MINUTE_STEP));

  buildCol(document.getElementById('col-hour'),   hours,   h);
  buildCol(document.getElementById('col-minute'), minutes, Math.round(m/MINUTE_STEP));

  document.getElementById('modal-title').textContent =
    field === 'start' ? '开始进食时间' : '结束进食时间';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePicker() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  pickerField = pickerDateKey = null;
}

function handlePickerOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closePicker();
}

function getPickerValue() {
  const hCol = document.getElementById('col-hour');
  const mCol = document.getElementById('col-minute');
  const hours   = Array.from({length:24}, (_,i) => pad(i));
  const minutes = Array.from({length:60/MINUTE_STEP}, (_,i) => pad(i*MINUTE_STEP));
  const hIdx = Math.min(Math.round(hCol.scrollTop/44), hours.length-1);
  const mIdx = Math.min(Math.round(mCol.scrollTop/44), minutes.length-1);
  return `${hours[hIdx]}:${minutes[mIdx]}`;
}

function confirmPicker() {
  const val     = getPickerValue();
  const field   = pickerField;
  const dateKey = pickerDateKey;
  closePicker();
  saveTime(field, val, dateKey);
}

// ── Action Sheet (history edit) ────────────────────────────

function openActionSheet(dateKey) {
  actionDateKey = dateKey;
  const rec = getRecords()[dateKey] || {};
  const win = rec.start && rec.end ? `${rec.start} – ${rec.end}`
            : rec.start ? `${rec.start} – 未结束` : '无记录';
  document.getElementById('action-title').textContent = `${fmtKey(dateKey)}  ${win}`;
  document.getElementById('action-sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeActionSheet() {
  document.getElementById('action-sheet').classList.remove('open');
  document.body.style.overflow = '';
  actionDateKey = null;
}

function handleActionOverlayClick(e) {
  if (e.target === document.getElementById('action-sheet')) closeActionSheet();
}

function editHistoryField(field) {
  const key = actionDateKey;
  closeActionSheet();
  openPicker(field, key);
}

function deleteHistoryRecord() {
  const key = actionDateKey;
  closeActionSheet();
  const records = getRecords();
  delete records[key];
  saveRecords(records);
  if (key === todayKey()) refreshToday({});
  renderChart();
  renderHistory();
}

// ── Record / Save ─────────────────────────────────────────

function recordNow(field) { saveTime(field, nowHHMM(), todayKey()); }

function saveTime(field, val, dateKey) {
  dateKey = dateKey || todayKey();
  const records = getRecords();
  if (!records[dateKey]) records[dateKey] = {};
  records[dateKey][field] = val;
  saveRecords(records);
  if (dateKey === todayKey()) refreshToday(records[dateKey]);
  renderChart();
  renderHistory();
}

// ── Today display ─────────────────────────────────────────

function refreshToday(rec) {
  const sEl = document.getElementById('start-display');
  const eEl = document.getElementById('end-display');

  if (rec.start) {
    sEl.textContent  = rec.start;
    sEl.className    = 'time-val';
  } else {
    sEl.textContent  = '点击记录';
    sEl.className    = 'time-placeholder-text';
  }

  if (rec.end) {
    eEl.textContent  = rec.end;
    eEl.className    = 'time-val';
  } else {
    eEl.textContent  = '点击记录';
    eEl.className    = 'time-placeholder-text';
  }

  document.getElementById('btn-end').disabled = !rec.start;

  if (rec.start && rec.end) {
    const eatH = calcEatHours(rec.start, rec.end);
    document.getElementById('eat-hours').textContent  = `${eatH.toFixed(1)}h`;
    document.getElementById('fast-hours').textContent = `${(24-eatH).toFixed(1)}h`;
    document.getElementById('duration-row').style.display = 'flex';
    showHint('next', rec.end);
  } else if (rec.start) {
    document.getElementById('duration-row').style.display = 'none';
    showHint('end', rec.start);
  } else {
    document.getElementById('duration-row').style.display = 'none';
    hideHint();
  }
}

// ── Hint ──────────────────────────────────────────────────

function showHint(type, t) {
  const card = document.getElementById('hint-card');
  document.getElementById('hint-label').textContent =
    type === 'end' ? '建议今日结束进食' : '建议明日开始进食';
  const mode = getMode();
  document.getElementById('hint-time').textContent =
    addMinutes(t, (type === 'end' ? mode.eat : mode.fast) * 60);
  document.getElementById('hint-sub').textContent =
    type === 'end'
      ? `进食 ${mode.eat}h 后结束，可设置闹钟`
      : `断食 ${mode.fast}h 后开始，可设置明日闹钟`;
  card.classList.add('visible');
}

function hideHint() { document.getElementById('hint-card').classList.remove('visible'); }

// ── Chart ─────────────────────────────────────────────────

function renderChart() {
  const records = getRecords();
  // Only render days that exist in records, up to 30, sorted oldest→newest
  const allKeys = Object.keys(records).sort();
  const days = allKeys.slice(-30);

  const container = document.getElementById('chart-container');
  if (!days.length) {
    container.innerHTML = `<p style="text-align:center;color:var(--label3);font-size:13px;padding:20px 0">暂无数据</p>`;
    return;
  }

  const BW=9, GAP=3, CH=120, LH=20, MAXV=12, TARGET=getMode().eat;
  const W = days.length*(BW+GAP)-GAP+2;
  const tY = CH-(TARGET/MAXV)*CH;

  const bars = days.map((k,i) => {
    const r = records[k], x = i*(BW+GAP)+1;
    if (!r||!r.start||!r.end)
      return `<rect x="${x}" y="${CH-3}" width="${BW}" height="3" rx="1.5" fill="#d1d1d6"/>`;
    const h = Math.min(calcEatHours(r.start,r.end),MAXV);
    const barH = Math.max((h/MAXV)*CH,4);
    return `<rect x="${x}" y="${CH-barH}" width="${BW}" height="${barH}" rx="2" fill="${h<=TARGET?'#3d52d5':'#e03e3e'}"/>`;
  });

  const labels = days.map((k,i) => {
    const [,m,d] = k.split('-').map(Number);
    if (d===1||i===0||i===days.length-1) {
      const x = i*(BW+GAP)+1+BW/2;
      return `<text x="${x}" y="${CH+LH-2}" font-size="9" fill="#adadb8" text-anchor="middle">${m}/${d}</text>`;
    }
    return '';
  });

  container.innerHTML =
    `<svg width="${W}" height="${CH+LH+4}" viewBox="0 0 ${W} ${CH+LH+4}" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="${tY}" x2="${W}" y2="${tY}" stroke="#3d52d5" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
      <text x="${W-1}" y="${tY-4}" font-size="9" fill="#3d52d5" text-anchor="end" opacity="0.6">${TARGET}h</text>
      ${bars.join('')}${labels.join('')}
    </svg>`;
}

// ── History ───────────────────────────────────────────────

function renderHistory() {
  const records = getRecords();
  const keys = Object.keys(records).sort().reverse().slice(0,30);
  const list  = document.getElementById('history-list');

  if (!keys.length) {
    list.innerHTML = `<div style="padding:16px;text-align:center;font-size:15px;color:var(--label3)">暂无记录</div>`;
    return;
  }

  list.innerHTML = keys.map((k,i) => {
    const r   = records[k];
    const win = r.start&&r.end ? `${r.start} – ${r.end}`
              : r.start ? `${r.start} – …` : '未记录';
    let dur='', cls='h-part';
    if (r.start&&r.end) {
      const h = calcEatHours(r.start,r.end);
      dur = `${h.toFixed(1)}h`;
      cls = h<=getMode().eat ? 'h-ok' : 'h-over';
    }
    const sep = i<keys.length-1 ? `border-bottom:0.5px solid var(--sep)` : '';
    return `<div class="history-item" style="${sep}" onclick="openActionSheet('${k}')">
      <span class="h-date">${fmtKey(k)}</span>
      <span class="h-win">${win}</span>
      <span class="h-dur ${cls}">${dur}</span>
    </div>`;
  }).join('');
}

// ── Export CSV ────────────────────────────────────────────

function exportCSV() {
  const records = getRecords();
  const keys = Object.keys(records).sort();
  if (!keys.length) { alert('暂无记录可导出'); return; }

  const rows = [['日期','开始时间','结束时间','进食时长(h)','断食时长(h)']];
  keys.forEach(k => {
    const r = records[k];
    if (r.start&&r.end) {
      const eatH = calcEatHours(r.start,r.end);
      rows.push([k, r.start, r.end, eatH.toFixed(2), (24-eatH).toFixed(2)]);
    } else {
      rows.push([k, r.start||'', r.end||'', '', '']);
    }
  });

  const csv      = rows.map(r=>r.join(',')).join('\n');
  const filename = `fasting-${todayKey()}.csv`;
  fallbackDownload(csv, filename);
}

function fallbackDownload(csv, filename) {
  const url = URL.createObjectURL(new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'}));
  const a   = Object.assign(document.createElement('a'), {href:url, download:filename});
  a.click();
  URL.revokeObjectURL(url);
}

// ── Init ──────────────────────────────────────────────────

function init() {
  const d = new Date();
  document.getElementById('today-label').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;

  renderModeSelector();
  refreshToday(getRecords()[todayKey()] || {});
  renderHistory();
  renderChart();

  if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('service-worker.js');
}

init();
</script>
